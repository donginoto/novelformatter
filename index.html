<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소설 HTML 에디터</title>
<style>
  :root {
    --bg: #f8f6f3;
    --surface: #ffffff;
    --surface-alt: #f0ede8;
    --text: #3a3a3a;
    --text-muted: #999;
    --accent: #c9a0dc;
    --accent-hover: #b07cc8;
    --border: #e4ddd4;
    --shadow: rgba(0,0,0,0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 0.3rem;
    color: var(--text);
    font-weight: 700;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
  }

  .container {
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* === 패널 공통 === */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .panel-title {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* === 색상 관리 === */
  .color-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-bottom: 0.8rem;
  }

  .color-chip {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.25rem 0.5rem;
    font-size: 0;
    cursor: default;
  }

  .color-chip .swatch {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }

  .color-chip .remove-color {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
    line-height: 1;
    padding: 0 0.15rem;
    transition: color 0.15s;
  }

  .color-chip .remove-color:hover { color: #e74c3c; }

  .color-add-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .color-add-row input[type="color"] {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
    cursor: pointer;
    background: var(--surface-alt);
  }

  .btn-small {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 0.45rem 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    transition: background 0.15s;
  }

  .btn-small:hover { background: var(--accent-hover); }

  /* === 독백 색상 설정 === */
  .monologue-settings {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    flex-wrap: wrap;
  }

  .monologue-settings label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .monologue-settings input[type="color"] {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    cursor: pointer;
    background: var(--surface-alt);
  }

  /* === 챕터 제목 색상 === */
  .heading-settings {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .heading-settings label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .heading-settings input[type="color"] {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    cursor: pointer;
    background: var(--surface-alt);
  }

  /* === 입력 영역 === */
  .input-section label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.6rem;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    color: var(--text);
    font-size: 0.92rem;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    font-family: inherit;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #bbb; font-size: 0.85rem; }

  /* === 버튼 그룹 === */
  .btn-group {
    display: flex;
    gap: 0.7rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 0.7rem 1.8rem;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn-edit { background: var(--accent); color: #fff; }
  .btn-edit:hover { background: var(--accent-hover); }
  .btn-chapter { background: #a8d8b9; color: #fff; }
  .btn-chapter:hover { background: #8cc9a1; }
  .btn-convert { background: #8ec5e2; color: #fff; }
  .btn-convert:hover { background: #6fb5d8; }
  .btn-convert:disabled, .btn-chapter:disabled { opacity: 0.4; cursor: not-allowed; }

  /* === 일괄 형광펜 버튼 === */
  .batch-bar {
    display: none;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 0.7rem 1.2rem;
    box-shadow: 0 2px 12px rgba(201,160,220,0.15);
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .batch-bar.active { display: flex; }

  .batch-bar-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .batch-color-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }

  .batch-color-btn:hover {
    border-color: var(--accent);
    transform: scale(1.12);
  }

  .batch-color-btn.reset-btn {
    background: var(--surface-alt);
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .batch-deselect {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    margin-left: 0.3rem;
    transition: background 0.15s;
  }

  .batch-deselect:hover { background: #f3eef8; }

  /* === 챕터 리스트 === */
  .chapter-list { display: none; }
  .chapter-list.active { display: block; }

  .chapter-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 0.5rem;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .chapter-item:hover { background: #f3eef8; }
  .chapter-item.selected { border-color: var(--accent); background: #f3eef8; }
  .chapter-item-name { font-weight: 600; flex: 1; }

  .chapter-item-actions {
    display: flex;
    gap: 0.3rem;
  }

  .chapter-item-actions button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .chapter-item-actions button:hover { color: #e74c3c; background: rgba(231,76,60,0.08); }
  .chapter-item-actions .edit-chapter-btn:hover { color: var(--accent-hover); background: rgba(201,160,220,0.1); }

  /* === 미리보기 === */
  .preview-section { display: none; }
  .preview-section.active { display: block; }

  .preview-hint {
    font-size: 0.78rem;
    color: #bbb;
    margin-bottom: 1rem;
  }

  .preview-body {
    line-height: 2;
    font-size: 1rem;
  }

  .preview-body .line {
    padding: 0.15rem 0.3rem;
    border-radius: 4px;
    cursor: default;
    transition: background 0.15s;
    display: block;
    margin-bottom: 0.2rem;
    position: relative;
  }

  .preview-body .line-narration { color: #3a3a3a; }

  .preview-body .line-dialogue {
    cursor: pointer;
    padding-left: 0.4rem;
  }

  .preview-body .line-dialogue:hover { background: rgba(0,0,0,0.03); }

  .preview-body .line-dialogue.selected-for-batch {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-radius: 4px;
  }

  .preview-body .line-monologue {
    font-style: italic;
  }

  .preview-body .chapter-heading {
    font-size: 1.05rem;
    font-weight: 700;
    margin: 1rem 0 0.5rem 0;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--border);
  }

  /* === 색상 선택 팝업 === */
  .color-popup {
    position: fixed;
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.5rem;
    gap: 0.4rem;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    flex-wrap: wrap;
    max-width: 220px;
  }

  .color-popup.show { display: flex; }

  .color-popup-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }

  .color-popup-btn:hover { border-color: var(--accent); transform: scale(1.12); }

  .color-popup-btn.reset-btn {
    background: var(--surface-alt);
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* === 토스트 === */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 0.7rem 1.5rem;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 2000;
    box-shadow: 0 4px 16px rgba(201,160,220,0.3);
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* === 범례 === */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
  }

  .legend span { display: flex; align-items: center; gap: 0.3rem; }

  .legend-icon {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    display: inline-block;
    border: 1px solid rgba(0,0,0,0.06);
  }

  /* === 모달 === */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.25);
    z-index: 3000;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 1.5rem;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  .modal h3 { font-size: 1rem; margin-bottom: 0.8rem; color: var(--text); }

  .modal input[type="text"] {
    width: 100%;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    margin-bottom: 1rem;
  }

  .modal input[type="text"]:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 0.5rem; justify-content: flex-end; }

  .modal-btns button {
    padding: 0.45rem 1.2rem;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }

  .modal-btns .modal-cancel { background: var(--surface-alt); color: var(--text-muted); }
  .modal-btns .modal-confirm { background: var(--accent); color: #fff; }

  @media (max-width: 600px) {
    body { padding: 1rem 0.5rem; }
    .container { gap: 1rem; }
    .btn { padding: 0.6rem 1.2rem; font-size: 0.88rem; }
    textarea { min-height: 180px; }
    .panel { padding: 1rem; }
  }
</style>
</head>
<body>

<h1>소설 HTML 에디터</h1>
<p class="subtitle">소설 텍스트를 입력하고 대사에 형광펜을 칠한 뒤, HTML로 변환하세요.</p>

<div class="container">

  <!-- 색상 관리 -->
  <div class="panel">
    <div class="panel-title">형광펜 색상 관리</div>
    <div class="color-list" id="colorList"></div>
    <div class="color-add-row">
      <input type="color" id="colorValueInput" value="#f8b4c8">
      <button class="btn-small" id="addColorBtn">추가</button>
    </div>
  </div>

  <!-- 스타일 설정 -->
  <div class="panel">
    <div class="panel-title">스타일 설정</div>
    <div class="monologue-settings">
      <label>독백 글자색</label>
      <input type="color" id="monoColorInput" value="#aaaaaa">
    </div>
    <div class="heading-settings">
      <label>챕터 제목색</label>
      <input type="color" id="headingColorInput" value="#b07cc8">
    </div>
  </div>

  <!-- 입력 -->
  <div class="panel input-section">
    <label for="novelInput">소설 전문 입력</label>
    <textarea id="novelInput" placeholder='"안녕"
"안녕"
「안녕」
**깡캐:** 안녕
**깡캐**: 안녕
위의 형식을 대사로 처리합니다.

*안녕*
(안녕)
&#x27;안녕&#x27;
위의 형식을 독백으로 처리합니다.'></textarea>
  </div>

  <!-- 버튼 -->
  <div class="btn-group">
    <button class="btn btn-edit" id="editBtn">편집</button>
    <button class="btn btn-chapter" id="chapterAddBtn">챕터 추가</button>
    <button class="btn btn-convert" id="convertBtn" disabled>변환</button>
  </div>

  <!-- 일괄 형광펜 바 -->
  <div class="batch-bar" id="batchBar">
    <span class="batch-bar-label">선택한 대사에 일괄 적용:</span>
    <div id="batchColors"></div>
    <button class="batch-deselect" id="batchDeselect">선택 해제</button>
  </div>

  <!-- 챕터 리스트 -->
  <div class="panel chapter-list" id="chapterList">
    <div class="panel-title">챕터 목록</div>
    <div id="chapterItems"></div>
  </div>

  <!-- 미리보기 -->
  <div class="panel preview-section" id="previewSection">
    <div class="panel-title">미리보기</div>
    <div class="preview-hint">대사를 클릭하여 형광펜 색상을 지정하세요 · Shift+클릭으로 다중 선택</div>
    <div class="legend" id="legendArea"></div>
    <div class="preview-body" id="previewBody"></div>
  </div>

</div>

<!-- 색상 선택 팝업 (단일) -->
<div class="color-popup" id="colorPopup"></div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 모달 -->
<div class="modal-overlay" id="chapterModal">
  <div class="modal">
    <h3 id="chapterModalTitle">챕터 이름 입력</h3>
    <input type="text" id="chapterNameInput" placeholder="챕터 이름">
    <div class="modal-btns">
      <button class="modal-cancel" id="chapterModalCancel">취소</button>
      <button class="modal-confirm" id="chapterModalConfirm">확인</button>
    </div>
  </div>
</div>

<script>
(function() {

  /* ========== STATE ========== */
  const highlightColors = [];
  const chapters = [];
  let currentEditingChapter = -1;
  let monologueColor = '#aaaaaa';
  let headingColor = '#b07cc8';

  // 다중 선택
  const selectedDialogues = new Set(); // "chIdx-lineIdx"

  /* ========== DOM ========== */
  const colorList = document.getElementById('colorList');
  const colorValueInput = document.getElementById('colorValueInput');
  const addColorBtn = document.getElementById('addColorBtn');
  const monoColorInput = document.getElementById('monoColorInput');
  const headingColorInput = document.getElementById('headingColorInput');
  const novelInput = document.getElementById('novelInput');
  const editBtn = document.getElementById('editBtn');
  const chapterAddBtn = document.getElementById('chapterAddBtn');
  const convertBtn = document.getElementById('convertBtn');
  const previewSection = document.getElementById('previewSection');
  const previewBody = document.getElementById('previewBody');
  const colorPopup = document.getElementById('colorPopup');
  const legendArea = document.getElementById('legendArea');
  const chapterListEl = document.getElementById('chapterList');
  const chapterItemsEl = document.getElementById('chapterItems');
  const batchBar = document.getElementById('batchBar');
  const batchColors = document.getElementById('batchColors');
  const batchDeselect = document.getElementById('batchDeselect');

  const chapterModal = document.getElementById('chapterModal');
  const chapterModalTitle = document.getElementById('chapterModalTitle');
  const chapterNameInput = document.getElementById('chapterNameInput');
  const chapterModalCancel = document.getElementById('chapterModalCancel');
  const chapterModalConfirm = document.getElementById('chapterModalConfirm');
  let modalCallback = null;

  /* ========== DEFAULT COLORS ========== */
  const defaults = [
    { value: '#f8b4c8' },
    { value: '#fef3a7' },
    { value: '#c8e6b2' },
    { value: '#a8d8ea' },
    { value: '#d4b5e0' },
    { value: '#d5d5d5' },
  ];
  defaults.forEach(c => addColor(c.value));

  /* ========== COLOR MANAGEMENT ========== */
  function addColor(value) {
    highlightColors.push({ value });
    renderColors();
  }

  function removeColor(idx) {
    highlightColors.splice(idx, 1);
    renderColors();
  }

  function renderColors() {
    colorList.innerHTML = '';
    highlightColors.forEach((c, i) => {
      const chip = document.createElement('div');
      chip.className = 'color-chip';
      chip.innerHTML = `
        <span class="swatch" style="background:${c.value}"></span>
        <button class="remove-color" data-idx="${i}">&times;</button>
      `;
      colorList.appendChild(chip);
    });
    colorList.querySelectorAll('.remove-color').forEach(btn => {
      btn.addEventListener('click', () => removeColor(parseInt(btn.dataset.idx)));
    });
    renderLegend();
    renderBatchColors();
  }

  function renderLegend() {
    legendArea.innerHTML = '';
    highlightColors.forEach(c => {
      const s = document.createElement('span');
      s.innerHTML = `<span class="legend-icon" style="background:${c.value}"></span>`;
      legendArea.appendChild(s);
    });
  }

  addColorBtn.addEventListener('click', () => {
    addColor(colorValueInput.value);
  });

  /* ========== MONOLOGUE & HEADING COLOR ========== */
  monoColorInput.addEventListener('input', () => {
    monologueColor = monoColorInput.value;
    renderFullPreview();
  });

  headingColorInput.addEventListener('input', () => {
    headingColor = headingColorInput.value;
    renderFullPreview();
  });

  /* ========== TEXT PARSING ========== */
  function classifyLine(raw) {
    const trimmed = raw.trim();
    if (!trimmed) return { type: 'empty', original: raw };

    // 챕터 헤딩
    if (/^###\s+/.test(trimmed)) {
      return { type: 'heading', original: raw, headingText: trimmed.replace(/^###\s+/, '') };
    }

    // 독백: *텍스트* (단일)
    if (/^\*[^*].*[^*]\*$/.test(trimmed) && !trimmed.startsWith('**')) {
      return { type: 'monologue', original: raw };
    }

    // 독백: (텍스트)
    if (/^\(.*\)$/.test(trimmed)) {
      return { type: 'monologue', original: raw };
    }

    // 독백: '텍스트' 또는 '텍스트'
    if (/^'[^']+'$/.test(trimmed) || /^'[^']+'$/.test(trimmed)) {
      return { type: 'monologue', original: raw };
    }

    // 대사: 「...」
    if (/^「.*」$/.test(trimmed)) {
      return { type: 'dialogue', original: raw, highlightColor: null };
    }

    // 대사: "..." "..." "..."
    if (/^".*"$/.test(trimmed) || /^\u201c.*\u201d$/.test(trimmed) || /^\u201c.*"$/.test(trimmed) || /^".*\u201d$/.test(trimmed)) {
      return { type: 'dialogue', original: raw, highlightColor: null };
    }

    // 대사: **이름**: / **이름**:
    if (/^\*\*[^*]+\*\*\s*[:：]/.test(trimmed)) {
      return { type: 'dialogue', original: raw, highlightColor: null };
    }

    return { type: 'narration', original: raw };
  }

  function parseText(text) {
    return text.split('\n').map(l => classifyLine(l));
  }

  function splitByHeadings(lineDataArr) {
    const result = [];
    let current = null;
    lineDataArr.forEach(item => {
      if (item.type === 'heading') {
        if (current) result.push(current);
        current = { name: item.headingText, lineData: [] };
      } else {
        if (!current) current = { name: '챕터 ' + (result.length + 1), lineData: [] };
        current.lineData.push(item);
      }
    });
    if (current && current.lineData.length > 0) result.push(current);
    return result;
  }

  /* ========== EDIT ========== */
  editBtn.addEventListener('click', () => {
    const text = novelInput.value;
    if (!text.trim()) return;

    const allLines = parseText(text);
    const hasHeadings = allLines.some(l => l.type === 'heading');

    if (hasHeadings) {
      splitByHeadings(allLines).forEach(ch => chapters.push(ch));
      novelInput.value = '';
    } else if (chapters.length > 0 && currentEditingChapter >= 0 && currentEditingChapter < chapters.length) {
      chapters[currentEditingChapter].lineData = allLines.filter(l => l.type !== 'heading');
    } else {
      chapters.length = 0;
      chapters.push({ name: '챕터 1', lineData: allLines });
    }

    selectedDialogues.clear();
    renderChapterList();
    renderFullPreview();
    previewSection.classList.add('active');
    convertBtn.disabled = false;
    updateBatchBar();
  });

  /* ========== CHAPTER ADD ========== */
  chapterAddBtn.addEventListener('click', () => {
    const text = novelInput.value;
    if (!text.trim()) return;
    const allLines = parseText(text);
    const filtered = allLines.filter(l => l.type !== 'heading');
    if (filtered.length === 0) return;

    openModal('챕터 이름 입력', '챕터 ' + (chapters.length + 1), (name) => {
      chapters.push({ name, lineData: filtered });
      novelInput.value = '';
      selectedDialogues.clear();
      renderChapterList();
      renderFullPreview();
      previewSection.classList.add('active');
      convertBtn.disabled = false;
      updateBatchBar();
    });
  });

  /* ========== MODAL ========== */
  function openModal(title, defaultVal, callback) {
    chapterModalTitle.textContent = title;
    chapterNameInput.value = defaultVal;
    modalCallback = callback;
    chapterModal.classList.add('show');
    setTimeout(() => chapterNameInput.focus(), 100);
  }

  function closeModal() {
    chapterModal.classList.remove('show');
    modalCallback = null;
  }

  chapterModalCancel.addEventListener('click', closeModal);
  chapterModalConfirm.addEventListener('click', () => {
    const name = chapterNameInput.value.trim() || '무제';
    if (modalCallback) modalCallback(name);
    closeModal();
  });
  chapterNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') chapterModalConfirm.click(); });
  chapterModal.addEventListener('click', (e) => { if (e.target === chapterModal) closeModal(); });

  /* ========== CHAPTER LIST ========== */
  function renderChapterList() {
    if (chapters.length === 0) { chapterListEl.classList.remove('active'); return; }
    chapterListEl.classList.add('active');
    chapterItemsEl.innerHTML = '';

    chapters.forEach((ch, i) => {
      const item = document.createElement('div');
      item.className = 'chapter-item' + (currentEditingChapter === i ? ' selected' : '');
      item.innerHTML = `
        <span class="chapter-item-name">${i + 1}. ${escapeHtml(ch.name)}</span>
        <span style="font-size:0.75rem;color:#bbb;margin-right:0.5rem;">${ch.lineData.length}줄</span>
        <div class="chapter-item-actions">
          <button class="edit-chapter-btn" title="이름 수정" data-idx="${i}">✎</button>
          <button class="delete-chapter-btn" title="삭제" data-idx="${i}">✕</button>
        </div>
      `;
      item.addEventListener('click', (e) => {
        if (e.target.closest('.chapter-item-actions')) return;
        currentEditingChapter = i;
        novelInput.value = ch.lineData.map(l => l.original).join('\n');
        renderChapterList();
      });
      chapterItemsEl.appendChild(item);
    });

    chapterItemsEl.querySelectorAll('.edit-chapter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        openModal('챕터 이름 수정', chapters[idx].name, (name) => {
          chapters[idx].name = name;
          renderChapterList();
          renderFullPreview();
        });
      });
    });

    chapterItemsEl.querySelectorAll('.delete-chapter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        chapters.splice(idx, 1);
        if (currentEditingChapter >= chapters.length) currentEditingChapter = chapters.length - 1;
        selectedDialogues.clear();
        renderChapterList();
        renderFullPreview();
        updateBatchBar();
        if (chapters.length === 0) { previewSection.classList.remove('active'); convertBtn.disabled = true; }
      });
    });
  }

  /* ========== PREVIEW ========== */
  function renderFullPreview() {
    previewBody.innerHTML = '';

    chapters.forEach((ch, chIdx) => {
      const heading = document.createElement('div');
      heading.className = 'chapter-heading';
      heading.textContent = ch.name;
      heading.style.color = headingColor;
      previewBody.appendChild(heading);

      ch.lineData.forEach((item, lineIdx) => {
        if (item.type === 'empty') {
          const br = document.createElement('div');
          br.style.height = '0.5em';
          previewBody.appendChild(br);
          return;
        }

        const el = document.createElement('div');
        el.className = 'line';
        el.dataset.chapter = chIdx;
        el.dataset.line = lineIdx;
        const key = chIdx + '-' + lineIdx;
        const displayText = escapeHtml(item.original.trim());

        if (item.type === 'narration') {
          el.classList.add('line-narration');
          el.innerHTML = displayText;
        } else if (item.type === 'dialogue') {
          el.classList.add('line-dialogue');
          el.innerHTML = displayText;
          if (item.highlightColor) {
            el.style.background = item.highlightColor + '40';
          }
          if (selectedDialogues.has(key)) {
            el.classList.add('selected-for-batch');
          }
          el.addEventListener('click', (e) => handleDialogueClick(e, chIdx, lineIdx, el));
        } else if (item.type === 'monologue') {
          el.classList.add('line-monologue');
          el.style.color = monologueColor;
          el.innerHTML = displayText;
        }

        previewBody.appendChild(el);
      });
    });
  }

  /* ========== DIALOGUE CLICK (SINGLE / MULTI) ========== */
  function handleDialogueClick(e, chIdx, lineIdx, el) {
    e.stopPropagation();
    const key = chIdx + '-' + lineIdx;

    if (e.shiftKey) {
      // 다중 선택 토글
      if (selectedDialogues.has(key)) {
        selectedDialogues.delete(key);
        el.classList.remove('selected-for-batch');
      } else {
        selectedDialogues.add(key);
        el.classList.add('selected-for-batch');
      }
      updateBatchBar();
      closePopup();
    } else {
      // 이미 다중 선택 중이면 이 클릭도 다중 선택에 추가
      if (selectedDialogues.size > 0) {
        if (selectedDialogues.has(key)) {
          selectedDialogues.delete(key);
          el.classList.remove('selected-for-batch');
        } else {
          selectedDialogues.add(key);
          el.classList.add('selected-for-batch');
        }
        updateBatchBar();
        closePopup();
      } else {
        // 단일: 팝업
        openColorPopup(e, chIdx, lineIdx, el);
      }
    }
  }

  /* ========== COLOR POPUP (SINGLE) ========== */
  function openColorPopup(e, chIdx, lineIdx, el) {
    colorPopup.innerHTML = '';

    highlightColors.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'color-popup-btn';
      btn.style.background = c.value;
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        applyHighlight(chIdx, lineIdx, el, c.value);
        closePopup();
      });
      colorPopup.appendChild(btn);
    });

    const resetBtn = document.createElement('button');
    resetBtn.className = 'color-popup-btn reset-btn';
    resetBtn.textContent = '✕';
    resetBtn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      applyHighlight(chIdx, lineIdx, el, null);
      closePopup();
    });
    colorPopup.appendChild(resetBtn);

    const rect = el.getBoundingClientRect();
    let left = e.clientX;
    let top = rect.bottom + 6;
    if (left + 220 > window.innerWidth) left = window.innerWidth - 230;
    if (top + 50 > window.innerHeight) top = rect.top - 50;
    colorPopup.style.left = left + 'px';
    colorPopup.style.top = top + 'px';
    colorPopup.classList.add('show');
  }

  function applyHighlight(chIdx, lineIdx, el, color) {
    chapters[chIdx].lineData[lineIdx].highlightColor = color;
    if (color) {
      el.style.background = color + '40';
    } else {
      el.style.background = '';
    }
  }

  function closePopup() {
    colorPopup.classList.remove('show');
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.color-popup') && !e.target.closest('.line-dialogue')) {
      closePopup();
    }
    // 프리뷰 바깥 클릭 시 다중 선택 해제
    if (!e.target.closest('.preview-body') && !e.target.closest('.batch-bar') && !e.target.closest('.color-popup')) {
      if (selectedDialogues.size > 0) {
        selectedDialogues.clear();
        renderFullPreview();
        updateBatchBar();
      }
    }
  });

  /* ========== BATCH BAR ========== */
  function updateBatchBar() {
    if (selectedDialogues.size > 0) {
      batchBar.classList.add('active');
      renderBatchColors();
    } else {
      batchBar.classList.remove('active');
    }
  }

  function renderBatchColors() {
    batchColors.innerHTML = '';
    highlightColors.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'batch-color-btn';
      btn.style.background = c.value;
      btn.addEventListener('click', () => applyBatchColor(c.value));
      batchColors.appendChild(btn);
    });

    const resetBtn = document.createElement('button');
    resetBtn.className = 'batch-color-btn reset-btn';
    resetBtn.textContent = '✕';
    resetBtn.addEventListener('click', () => applyBatchColor(null));
    batchColors.appendChild(resetBtn);
  }

  function applyBatchColor(color) {
    selectedDialogues.forEach(key => {
      const [ch, ln] = key.split('-').map(Number);
      if (chapters[ch] && chapters[ch].lineData[ln]) {
        chapters[ch].lineData[ln].highlightColor = color;
      }
    });
    selectedDialogues.clear();
    renderFullPreview();
    updateBatchBar();
  }

  batchDeselect.addEventListener('click', () => {
    selectedDialogues.clear();
    renderFullPreview();
    updateBatchBar();
  });

  /* ========== CONVERT ========== */
  convertBtn.addEventListener('click', () => {
    if (chapters.length === 0) return;
    const html = generateHtml();
    copyToClipboard(html);
    showToast('HTML 코드가 클립보드에 복사되었습니다!');
  });

  function generateHtml() {
    const parts = [];
    const mc = monologueColor;
    const hc = headingColor;

    parts.push(`<div style="max-width:720px!important;margin:0 auto!important;padding:1.5rem!important;font-family:'Noto Sans KR',sans-serif!important;line-height:1.9!important;color:#3a3a3a!important;font-size:1rem!important;word-break:keep-all!important;overflow-wrap:break-word!important;box-sizing:border-box!important;">`);

    const multi = chapters.length > 1;

    chapters.forEach((ch, chIdx) => {

        parts.push(`<summary style="font-size:1.05rem!important;font-weight:700!important;color:${hc}!important;cursor:pointer!important;padding:0.6rem 0!important;border-bottom:2px solid #e4ddd4!important;margin-bottom:0.5rem!important;">${escapeHtml(ch.name)}</summary>`);
      }

      ch.lineData.forEach(item => {
        if (item.type === 'empty') { parts.push('<br>'); return; }
        const text = escapeHtml(item.original.trim());

        if (item.type === 'narration') {
          parts.push(`<p style="color:#3a3a3a!important;margin:0.4em 0!important;line-height:1.9!important;">${text}</p>`);
        } else if (item.type === 'dialogue') {
          if (item.highlightColor) {
            parts.push(`<p style="background:${item.highlightColor}40!important;padding:0.15em 0.4em!important;border-radius:4px!important;margin:0.4em 0!important;line-height:1.9!important;">${text}</p>`);
          } else {
            parts.push(`<p style="color:#3a3a3a!important;margin:0.4em 0!important;line-height:1.9!important;">${text}</p>`);
          }
        } else if (item.type === 'monologue') {
          parts.push(`<p style="color:${mc}!important;font-style:italic!important;margin:0.4em 0!important;line-height:1.9!important;">${text}</p>`);
        }
      });

      if (multi) parts.push(`</details>`);
    });

    parts.push(`</div>`);
    return parts.join('\n');
  }

    return d.innerHTML;
