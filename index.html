<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 자동 포매터 - 하이라이터</title>
    <style>
        :root {
            --bg-color: #f7f5f2;
            --panel-bg: #ede9e3;
            --text-main: #1a1a1a;
        }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; }
        h1 { text-align: center; font-size: 1.5rem; color: #3a3530; }
        
        textarea { width: 100%; height: 200px; padding: 15px; border: 1px solid #c8c0b5; border-radius: 8px; background: white; font-size: 14px; line-height: 1.6; box-sizing: border-box; }
        
        .btn-group { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-process { background: #8a7f6e; color: white; }
        .btn-copy { background: #5a8a7a; color: white; }
        
        /* 미리보기 영역 스타일 */
        #preview { 
            background: white; padding: 40px; border-radius: 8px; border: 1px solid #e0ddd7; 
            min-height: 300px; line-height: 1.95; font-size: 15px; white-space: pre-wrap;
        }

        /* 각 줄 스타일 (클릭 가능) */
        .line { cursor: pointer; padding: 2px 0; transition: background 0.2s; position: relative; }
        .line:hover::after { content: ' 🎨 클릭해서 색상 변경'; font-size: 11px; color: #888; position: absolute; right: 0; }

        /* 대사/독백/내레이션 기본 클래스 */
        .type-narration { color: #1a1a1a; }
        .type-dialogue { display: inline; border-radius: 3px; padding: 1px 4px; }
        .type-monologue { font-style: italic; color: #3a6a5a; border-left: 2px solid #5a8a7a; padding-left: 14px; display: block; margin: 10px 0; }

        /* 색상 팔레트 모달 */
        #palette { display: none; position: fixed; background: white; border: 1px solid #ccc; padding: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 100; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; display: inline-block; cursor: pointer; margin: 5px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 소설 자동 포매터</h1>
    <textarea id="inputText" placeholder="여기에 소설 전문을 붙여넣으세요. &#10;&quot;따옴표&quot;가 있는 줄은 자동으로 대사로 인식합니다."></textarea>
    
    <div class="btn-group">
        <button class="btn-process" onclick="processNovel()">변환하기</button>
        <button class="btn-copy" onclick="copyHTML()">HTML 코드 복사</button>
    </div>

    <div id="preview">변환된 소설이 여기에 표시됩니다. 줄을 클릭해서 색상을 바꾸세요!</div>
</div>

<div id="palette">
    <div class="color-dot" style="background: none; border: 1px dashed #ccc;" onclick="applyColor('')"></div>
    <div class="color-dot" style="background: rgba(255, 150, 180, 0.3);" onclick="applyColor('rgba(255, 150, 180, 0.3)')"></div>
    <div class="color-dot" style="background: rgba(100, 210, 190, 0.3);" onclick="applyColor('rgba(100, 210, 190, 0.3)')"></div>
    <div class="color-dot" style="background: rgba(160, 210, 120, 0.3);" onclick="applyColor('rgba(160, 210, 120, 0.3)')"></div>
    <div class="color-dot" style="background: rgba(255, 220, 100, 0.3);" onclick="applyColor('rgba(255, 220, 100, 0.3)')"></div>
    <div class="color-dot" style="background: rgba(150, 150, 150, 0.2);" onclick="applyColor('rgba(150, 150, 150, 0.2)')"></div>
</div>

<script>
    let selectedLine = null;

    function processNovel() {
        const text = document.getElementById('inputText').value;
        const preview = document.getElementById('preview');
        preview.innerHTML = '';

        const lines = text.split('\n');

        lines.forEach(line => {
            if (line.trim() === '') {
                preview.appendChild(document.createElement('br'));
                return;
            }

            const div = document.createElement('div');
            div.className = 'line';
            
            // 자동 인식 로직
            if (line.includes('"')) {
                div.classList.add('type-dialogue');
                div.style.backgroundColor = 'rgba(255, 150, 180, 0.3)'; // 기본 핑크
            } else if (line.includes('(') || line.includes('\'')) {
                div.classList.add('type-monologue');
            } else {
                div.classList.add('type-narration');
            }

            div.innerText = line;
            div.onclick = (e) => showPalette(e, div);
            preview.appendChild(div);
        });
    }

    function showPalette(e, element) {
        selectedLine = element;
        const palette = document.getElementById('palette');
        palette.style.display = 'block';
        palette.style.top = e.pageY + 'px';
        palette.style.left = e.pageX + 'px';
    }

    function applyColor(color) {
        if (selectedLine) {
            selectedLine.style.backgroundColor = color;
            document.getElementById('palette').style.display = 'none';
        }
    }

    function copyHTML() {
        const preview = document.getElementById('preview');
        // 스타일을 인라인으로 변환하여 복사 (외부 CSS 없이도 작동하게)
        let htmlOutput = `<div style="line-height:1.95; font-size:15px; font-family: sans-serif; color:#1a1a1a;">\n`;
        
        preview.childNodes.forEach(node => {
            if (node.nodeName === 'BR') {
                htmlOutput += `<br>\n`;
            } else {
                const bgColor = node.style.backgroundColor || 'transparent';
                const isMonologue = node.classList.contains('type-monologue');
                
                let style = `padding: 1px 4px; border-radius: 3px; background-color: ${bgColor};`;
                if(isMonologue) {
                    style = `font-style: italic; color: #3a6a5a; border-left: 2px solid #5a8a7a; padding-left: 14px; display: block; margin: 10px 0;`;
                }

                htmlOutput += `  <div style="${style}">${node.innerText}</div>\n`;
            }
        });
        
        htmlOutput += `</div>`;

        navigator.clipboard.writeText(htmlOutput).then(() => {
            alert('HTML 코드가 복사되었습니다! 포스타입이나 블로그의 HTML 편집기 모드에 붙여넣으세요.');
        });
    }

    // 배경 클릭 시 팔레트 닫기
    window.onclick = function(event) {
        if (!event.target.matches('.line') && !event.target.matches('.color-dot')) {
            document.getElementById('palette').style.display = 'none';
        }
    }
</script>

</body>
</html>
