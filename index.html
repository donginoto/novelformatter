<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>мҶҢм„Ө HTML м—җл””н„°</title>
<style>
  :root {
    --bg: #f8f6f3;
    --surface: #ffffff;
    --surface-alt: #f0ede8;
    --text: #3a3a3a;
    --text-muted: #999;
    --accent: #c9a0dc;
    --accent-hover: #b07cc8;
    --border: #e4ddd4;
    --shadow: rgba(0,0,0,0.05);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 0.3rem;
    color: var(--text);
    letter-spacing: 0.02em;
    font-weight: 700;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
  }

  .container {
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* === мғүмғҒ кҙҖлҰ¬ нҢЁл„җ === */
  .color-manager {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .color-manager-title {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .color-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .color-chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.7rem;
    font-size: 0.82rem;
    cursor: default;
  }

  .color-chip .swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }

  .color-chip .remove-color {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 0.1rem;
    transition: color 0.15s;
  }

  .color-chip .remove-color:hover {
    color: #e74c3c;
  }

  .color-add-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .color-add-row input[type="text"] {
    flex: 1;
    min-width: 100px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 0.7rem;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
  }

  .color-add-row input[type="text"]:focus {
    border-color: var(--accent);
  }

  .color-add-row input[type="color"] {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
    cursor: pointer;
    background: var(--surface-alt);
  }

  .btn-small {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 0.45rem 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    transition: background 0.15s;
  }

  .btn-small:hover {
    background: var(--accent-hover);
  }

  /* === мһ…л Ҙ мҳҒм—ӯ === */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .input-section label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.6rem;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    color: var(--text);
    font-size: 0.92rem;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    font-family: inherit;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: #bbb;
    font-size: 0.85rem;
  }

  /* === лІ„нҠј к·ёлЈ№ === */
  .btn-group {
    display: flex;
    gap: 0.7rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 0.7rem 1.8rem;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn-edit {
    background: var(--accent);
    color: #fff;
  }

  .btn-edit:hover {
    background: var(--accent-hover);
  }

  .btn-chapter {
    background: #a8d8b9;
    color: #fff;
  }

  .btn-chapter:hover {
    background: #8cc9a1;
  }

  .btn-convert {
    background: #8ec5e2;
    color: #fff;
  }

  .btn-convert:hover {
    background: #6fb5d8;
  }

  .btn-convert:disabled,
  .btn-chapter:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* === мұ•н„° лҰ¬мҠӨнҠё === */
  .chapter-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    box-shadow: 0 2px 8px var(--shadow);
    display: none;
  }

  .chapter-list.active {
    display: block;
  }

  .chapter-list-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.8rem;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 0.5rem;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .chapter-item:hover {
    background: #f3eef8;
  }

  .chapter-item.selected {
    border-color: var(--accent);
    background: #f3eef8;
  }

  .chapter-item-name {
    font-weight: 600;
    flex: 1;
  }

  .chapter-item-actions {
    display: flex;
    gap: 0.3rem;
  }

  .chapter-item-actions button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .chapter-item-actions button:hover {
    color: #e74c3c;
    background: rgba(231,76,60,0.08);
  }

  .chapter-item-actions .edit-chapter-btn:hover {
    color: var(--accent-hover);
    background: rgba(201,160,220,0.1);
  }

  /* === лҜёлҰ¬ліҙкё° мҳҒм—ӯ === */
  .preview-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 2px 8px var(--shadow);
    display: none;
  }

  .preview-section.active {
    display: block;
  }

  .preview-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
  }

  .preview-hint {
    font-size: 0.78rem;
    color: #bbb;
    margin-bottom: 1rem;
  }

  .preview-body {
    line-height: 2;
    font-size: 1rem;
  }

  .preview-body .line {
    padding: 0.15rem 0.3rem;
    border-radius: 4px;
    cursor: default;
    transition: background 0.15s;
    display: block;
    margin-bottom: 0.2rem;
  }

  .preview-body .line-narration {
    color: #3a3a3a;
  }

  .preview-body .line-dialogue {
    cursor: pointer;
    border-left: 3px solid transparent;
    padding-left: 0.6rem;
  }

  .preview-body .line-dialogue:hover {
    background: rgba(0,0,0,0.03);
  }

  .preview-body .line-monologue {
    color: #aaa;
    font-style: italic;
  }

  .preview-body .chapter-heading {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent-hover);
    margin: 1rem 0 0.5rem 0;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--border);
  }

  /* === мғүмғҒ м„ нғқ нҢқм—… === */
  .color-popup {
    position: fixed;
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.5rem;
    gap: 0.4rem;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    flex-wrap: wrap;
    max-width: 220px;
  }

  .color-popup.show {
    display: flex;
  }

  .color-popup-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }

  .color-popup-btn:hover {
    border-color: var(--accent);
    transform: scale(1.12);
  }

  .color-popup-btn.reset-btn {
    background: var(--surface-alt);
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* === нҶ мҠӨнҠё === */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 0.7rem 1.5rem;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 2000;
    box-shadow: 0 4px 16px rgba(201,160,220,0.3);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* === лІ”лЎҖ === */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .legend-icon {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    display: inline-block;
    border: 1px solid rgba(0,0,0,0.06);
  }

  /* === лӘЁлӢ¬ === */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.25);
    z-index: 3000;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 1.5rem;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  .modal h3 {
    font-size: 1rem;
    margin-bottom: 0.8rem;
    color: var(--text);
  }

  .modal input[type="text"] {
    width: 100%;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    margin-bottom: 1rem;
  }

  .modal input[type="text"]:focus {
    border-color: var(--accent);
  }

  .modal-btns {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }

  .modal-btns button {
    padding: 0.45rem 1.2rem;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }

  .modal-btns .modal-cancel {
    background: var(--surface-alt);
    color: var(--text-muted);
  }

  .modal-btns .modal-confirm {
    background: var(--accent);
    color: #fff;
  }

  @media (max-width: 600px) {
    body { padding: 1rem 0.5rem; }
    .container { gap: 1rem; }
    .btn { padding: 0.6rem 1.2rem; font-size: 0.88rem; }
    textarea { min-height: 180px; }
  }
</style>
</head>
<body>

<h1>мҶҢм„Ө HTML м—җл””н„°</h1>
<p class="subtitle">мҶҢм„Ө н…ҚмҠӨнҠёлҘј мһ…л Ҙн•ҳкі  лҢҖмӮ¬м—җ нҳ•кҙ‘нҺңмқ„ м№ н•ң л’Ө, HTMLлЎң ліҖнҷҳн•ҳм„ёмҡ”.</p>

<div class="container">

  <!-- мғүмғҒ кҙҖлҰ¬ -->
  <div class="color-manager">
    <div class="color-manager-title">нҳ•кҙ‘нҺң мғүмғҒ кҙҖлҰ¬</div>
    <div class="color-list" id="colorList"></div>
    <div class="color-add-row">
      <input type="text" id="colorNameInput" placeholder="мғүмғҒ мқҙлҰ„ (мҳҲ: м—°л¶„нҷҚ)">
      <input type="color" id="colorValueInput" value="#f8b4c8">
      <button class="btn-small" id="addColorBtn">м¶”к°Җ</button>
    </div>
  </div>

  <!-- мһ…л Ҙ -->
  <div class="input-section">
    <label for="novelInput">мҶҢм„Ө м „л¬ё мһ…л Ҙ</label>
    <textarea id="novelInput" placeholder='"м•Ҳл…•"
гҖҢм•Ҳл…•гҖҚ
**к№Ўмәҗ:** м•Ҳл…•
**к№Ўмәҗ**: м•Ҳл…•
мң„мқҳ нҳ•мӢқмқ„ лҢҖмӮ¬лЎң мІҳлҰ¬н•©лӢҲлӢӨ.

*м•Ҳл…•*
(м•Ҳл…•)
&#x27;м•Ҳл…•&#x27;
мң„мқҳ нҳ•мӢқмқ„ лҸ…л°ұмңјлЎң мІҳлҰ¬н•©лӢҲлӢӨ.'></textarea>
  </div>

  <!-- лІ„нҠј -->
  <div class="btn-group">
    <button class="btn btn-edit" id="editBtn">нҺём§‘</button>
    <button class="btn btn-chapter" id="chapterAddBtn">мұ•н„° м¶”к°Җ</button>
    <button class="btn btn-convert" id="convertBtn" disabled>ліҖнҷҳ</button>
  </div>

  <!-- мұ•н„° лҰ¬мҠӨнҠё -->
  <div class="chapter-list" id="chapterList">
    <div class="chapter-list-title">мұ•н„° лӘ©лЎқ</div>
    <div id="chapterItems"></div>
  </div>

  <!-- лҜёлҰ¬ліҙкё° -->
  <div class="preview-section" id="previewSection">
    <div class="preview-title">лҜёлҰ¬ліҙкё°</div>
    <div class="preview-hint">лҢҖмӮ¬лҘј нҒҙлҰӯн•ҳм—¬ нҳ•кҙ‘нҺң мғүмғҒмқ„ м§Җм •н•ҳм„ёмҡ”</div>
    <div class="legend" id="legendArea"></div>
    <div class="preview-body" id="previewBody"></div>
  </div>

</div>

<!-- мғүмғҒ м„ нғқ нҢқм—… -->
<div class="color-popup" id="colorPopup"></div>

<!-- нҶ мҠӨнҠё -->
<div class="toast" id="toast"></div>

<!-- мұ•н„° мқҙлҰ„ лӘЁлӢ¬ -->
<div class="modal-overlay" id="chapterModal">
  <div class="modal">
    <h3 id="chapterModalTitle">мұ•н„° мқҙлҰ„ мһ…л Ҙ</h3>
    <input type="text" id="chapterNameInput" placeholder="мұ•н„° мқҙлҰ„">
    <div class="modal-btns">
      <button class="modal-cancel" id="chapterModalCancel">м·ЁмҶҢ</button>
      <button class="modal-confirm" id="chapterModalConfirm">нҷ•мқё</button>
    </div>
  </div>
</div>

<script>
(function() {
  // === мғҒнғң ===
  const highlightColors = [];
  const chapters = []; // { name, lineData: [] }
  let currentEditingChapter = -1;

  // DOM
  const colorList = document.getElementById('colorList');
  const colorNameInput = document.getElementById('colorNameInput');
  const colorValueInput = document.getElementById('colorValueInput');
  const addColorBtn = document.getElementById('addColorBtn');
  const novelInput = document.getElementById('novelInput');
  const editBtn = document.getElementById('editBtn');
  const chapterAddBtn = document.getElementById('chapterAddBtn');
  const convertBtn = document.getElementById('convertBtn');
  const previewSection = document.getElementById('previewSection');
  const previewBody = document.getElementById('previewBody');
  const colorPopup = document.getElementById('colorPopup');
  const legendArea = document.getElementById('legendArea');
  const chapterListEl = document.getElementById('chapterList');
  const chapterItemsEl = document.getElementById('chapterItems');

  // Modal
  const chapterModal = document.getElementById('chapterModal');
  const chapterModalTitle = document.getElementById('chapterModalTitle');
  const chapterNameInput = document.getElementById('chapterNameInput');
  const chapterModalCancel = document.getElementById('chapterModalCancel');
  const chapterModalConfirm = document.getElementById('chapterModalConfirm');
  let modalCallback = null;

  // === кё°ліё мғүмғҒ ===
  const defaults = [
    { name: 'м—°л¶„нҷҚ', value: '#f8b4c8' },
    { name: 'м—°л…ёлһ‘', value: '#fef3a7' },
    { name: 'м—°л‘җ', value: '#c8e6b2' },
    { name: 'н•ҳлҠҳ', value: '#a8d8ea' },
    { name: 'м—°ліҙлқј', value: '#d4b5e0' },
    { name: 'м—°нҡҢмғү', value: '#d5d5d5' },
  ];

  defaults.forEach(c => addColor(c.name, c.value));

  // === мғүмғҒ кҙҖлҰ¬ ===
  function addColor(name, value) {
    highlightColors.push({ name, value });
    renderColors();
  }

  function removeColor(idx) {
    highlightColors.splice(idx, 1);
    renderColors();
  }

  function renderColors() {
    colorList.innerHTML = '';
    highlightColors.forEach((c, i) => {
      const chip = document.createElement('div');
      chip.className = 'color-chip';
      chip.innerHTML = `
        <span class="swatch" style="background:${c.value}"></span>
        <span>${c.name}</span>
        <button class="remove-color" data-idx="${i}">&times;</button>
      `;
      colorList.appendChild(chip);
    });
    colorList.querySelectorAll('.remove-color').forEach(btn => {
      btn.addEventListener('click', () => removeColor(parseInt(btn.dataset.idx)));
    });
    renderLegend();
  }

  function renderLegend() {
    legendArea.innerHTML = '';
    highlightColors.forEach(c => {
      const s = document.createElement('span');
      s.innerHTML = `<span class="legend-icon" style="background:${c.value}"></span>${c.name}`;
      legendArea.appendChild(s);
    });
  }

  addColorBtn.addEventListener('click', () => {
    const name = colorNameInput.value.trim();
    const value = colorValueInput.value;
    if (!name) return;
    addColor(name, value);
    colorNameInput.value = '';
  });

  // === н…ҚмҠӨнҠё нҢҢмӢұ ===
  function classifyLine(raw) {
    const trimmed = raw.trim();
    if (!trimmed) return { type: 'empty', original: raw };

    // мұ•н„° н—Өл”©: ### мңјлЎң мӢңмһ‘
    if (/^###\s+/.test(trimmed)) {
      return { type: 'heading', original: raw, headingText: trimmed.replace(/^###\s+/, '') };
    }

    // лҸ…л°ұ: *н…ҚмҠӨнҠё* (лӢЁмқј лі„н‘ң, **мқҙ м•„лӢҢ)
    if (/^\*[^*].*[^*]\*$/.test(trimmed) && !trimmed.startsWith('**')) {
      return { type: 'monologue', original: raw };
    }

    // лҸ…л°ұ: (н…ҚмҠӨнҠё)
    if (/^\(.*\)$/.test(trimmed)) {
      return { type: 'monologue', original: raw };
    }

    // лҸ…л°ұ: 'н…ҚмҠӨнҠё' (мһ‘мқҖл”°мҳҙн‘ң)
    if (/^'.*'$/.test(trimmed) || /^'.*'$/.test(trimmed)) {
      return { type: 'monologue', original: raw };
    }

    // лҢҖмӮ¬: гҖҢ...гҖҚ
    if (/^гҖҢ.*гҖҚ$/.test(trimmed)) {
      return { type: 'dialogue', original: raw, highlightColor: null };
    }

    // лҢҖмӮ¬: "..." лҳҗлҠ” "..."
    if (/^".*"$/.test(trimmed) || /^".*"$/.test(trimmed) || /^".*"$/.test(trimmed)) {
      return { type: 'dialogue', original: raw, highlightColor: null };
    }

    // лҢҖмӮ¬: **мқҙлҰ„**: н…ҚмҠӨнҠё лҳҗлҠ” **мқҙлҰ„**: н…ҚмҠӨнҠё
    if (/^\*\*[^*]+\*\*\s*[:пјҡ]/.test(trimmed)) {
      return { type: 'dialogue', original: raw, highlightColor: null };
    }

    // лӮҙл Ҳмқҙм…ҳ
    return { type: 'narration', original: raw };
  }

  function parseText(text) {
    const lines = text.split('\n');
    return lines.map(l => classifyLine(l));
  }

  // ### мһҗлҸҷ мұ•н„° л¶„н• 
  function splitByHeadings(lineDataArr) {
    const result = [];
    let current = null;

    lineDataArr.forEach(item => {
      if (item.type === 'heading') {
        if (current) result.push(current);
        current = { name: item.headingText, lineData: [] };
      } else {
        if (!current) {
          current = { name: 'мұ•н„° ' + (result.length + 1), lineData: [] };
        }
        current.lineData.push(item);
      }
    });

    if (current && current.lineData.length > 0) result.push(current);
    return result;
  }

  // === нҺём§‘ (н…ҚмҠӨнҠём—җм„ң ### к°җм§ҖмӢң мһҗлҸҷ мұ•н„° л¶„н• ) ===
  editBtn.addEventListener('click', () => {
    const text = novelInput.value;
    if (!text.trim()) return;

    const allLines = parseText(text);
    const hasHeadings = allLines.some(l => l.type === 'heading');

    if (hasHeadings) {
      const newChapters = splitByHeadings(allLines);
      // кё°мЎҙ мұ•н„°м—җ м¶”к°Җ
      newChapters.forEach(ch => chapters.push(ch));
      novelInput.value = '';
    } else if (chapters.length > 0) {
      // мұ•н„°к°Җ мқҙлҜё мһҲмңјл©ҙ нҳ„мһ¬ нҺём§‘ мӨ‘мқё мұ•н„°м—җ л°ҳмҳҒ
      if (currentEditingChapter >= 0 && currentEditingChapter < chapters.length) {
        chapters[currentEditingChapter].lineData = allLines.filter(l => l.type !== 'heading');
      }
    } else {
      // мұ•н„° м—Ҷмңјл©ҙ м „мІҙлҘј н•ҳлӮҳмқҳ мһ„мӢң лҜёлҰ¬ліҙкё°лЎң
      chapters.length = 0;
      chapters.push({ name: 'мұ•н„° 1', lineData: allLines });
    }

    renderChapterList();
    renderFullPreview();
    previewSection.classList.add('active');
    convertBtn.disabled = false;
  });

  // === мұ•н„° м¶”к°Җ ===
  chapterAddBtn.addEventListener('click', () => {
    const text = novelInput.value;
    if (!text.trim()) return;

    const allLines = parseText(text);
    const filtered = allLines.filter(l => l.type !== 'heading');
    if (filtered.length === 0) return;

    openModal('мұ•н„° мқҙлҰ„ мһ…л Ҙ', 'мұ•н„° ' + (chapters.length + 1), (name) => {
      chapters.push({ name, lineData: filtered });
      novelInput.value = '';
      renderChapterList();
      renderFullPreview();
      previewSection.classList.add('active');
      convertBtn.disabled = false;
    });
  });

  // === лӘЁлӢ¬ ===
  function openModal(title, defaultVal, callback) {
    chapterModalTitle.textContent = title;
    chapterNameInput.value = defaultVal;
    modalCallback = callback;
    chapterModal.classList.add('show');
    setTimeout(() => chapterNameInput.focus(), 100);
  }

  function closeModal() {
    chapterModal.classList.remove('show');
    modalCallback = null;
  }

  chapterModalCancel.addEventListener('click', closeModal);
  chapterModalConfirm.addEventListener('click', () => {
    const name = chapterNameInput.value.trim() || 'л¬ҙм ң';
    if (modalCallback) modalCallback(name);
    closeModal();
  });

  chapterNameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') chapterModalConfirm.click();
  });

  chapterModal.addEventListener('click', (e) => {
    if (e.target === chapterModal) closeModal();
  });

  // === мұ•н„° лҰ¬мҠӨнҠё л ҢлҚ”л§Ғ ===
  function renderChapterList() {
    if (chapters.length === 0) {
      chapterListEl.classList.remove('active');
      return;
    }
    chapterListEl.classList.add('active');
    chapterItemsEl.innerHTML = '';

    chapters.forEach((ch, i) => {
      const item = document.createElement('div');
      item.className = 'chapter-item' + (currentEditingChapter === i ? ' selected' : '');
      item.innerHTML = `
        <span class="chapter-item-name">${i + 1}. ${escapeHtml(ch.name)}</span>
        <span style="font-size:0.75rem;color:#bbb;margin-right:0.5rem;">${ch.lineData.length}мӨ„</span>
        <div class="chapter-item-actions">
          <button class="edit-chapter-btn" title="нҺём§‘" data-idx="${i}">вңҺ</button>
          <button class="delete-chapter-btn" title="мӮӯм ң" data-idx="${i}">вң•</button>
        </div>
      `;

      item.addEventListener('click', (e) => {
        if (e.target.closest('.chapter-item-actions')) return;
        currentEditingChapter = i;
        // н•ҙлӢ№ мұ•н„° лӮҙмҡ©мқ„ textareaм—җ лЎңл“ң
        novelInput.value = ch.lineData.map(l => l.original).join('\n');
        renderChapterList();
      });

      chapterItemsEl.appendChild(item);
    });

    chapterItemsEl.querySelectorAll('.edit-chapter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        openModal('мұ•н„° мқҙлҰ„ мҲҳм •', chapters[idx].name, (name) => {
          chapters[idx].name = name;
          renderChapterList();
          renderFullPreview();
        });
      });
    });

    chapterItemsEl.querySelectorAll('.delete-chapter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        chapters.splice(idx, 1);
        if (currentEditingChapter >= chapters.length) currentEditingChapter = chapters.length - 1;
        renderChapterList();
        renderFullPreview();
        if (chapters.length === 0) {
          previewSection.classList.remove('active');
          convertBtn.disabled = true;
        }
      });
    });
  }

  // === м „мІҙ лҜёлҰ¬ліҙкё° л ҢлҚ”л§Ғ ===
  function renderFullPreview() {
    previewBody.innerHTML = '';

    chapters.forEach((ch, chIdx) => {
      // мұ•н„° м ңлӘ©
      const heading = document.createElement('div');
      heading.className = 'chapter-heading';
      heading.textContent = ch.name;
      previewBody.appendChild(heading);

      ch.lineData.forEach((item, lineIdx) => {
        if (item.type === 'empty') {
          const br = document.createElement('div');
          br.style.height = '0.5em';
          previewBody.appendChild(br);
          return;
        }

        const el = document.createElement('div');
        el.className = 'line';
        el.dataset.chapter = chIdx;
        el.dataset.line = lineIdx;

        const displayText = escapeHtml(item.original.trim());

        if (item.type === 'narration') {
          el.classList.add('line-narration');
          el.innerHTML = displayText;
        } else if (item.type === 'dialogue') {
          el.classList.add('line-dialogue');
          el.innerHTML = displayText;
          if (item.highlightColor) {
            el.style.background = item.highlightColor + '33';
            el.style.borderLeftColor = item.highlightColor;
          }
          el.addEventListener('click', (e) => openColorPopup(e, chIdx, lineIdx, el));
        } else if (item.type === 'monologue') {
          el.classList.add('line-monologue');
          el.innerHTML = displayText;
        }

        previewBody.appendChild(el);
      });
    });
  }

  // === мғүмғҒ нҢқм—… ===
  function openColorPopup(e, chIdx, lineIdx, el) {
    e.stopPropagation();

    colorPopup.innerHTML = '';

    highlightColors.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'color-popup-btn';
      btn.style.background = c.value;
      btn.title = c.name;
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        applyHighlight(chIdx, lineIdx, el, c.value);
        closePopup();
      });
      colorPopup.appendChild(btn);
    });

    const resetBtn = document.createElement('button');
    resetBtn.className = 'color-popup-btn reset-btn';
    resetBtn.textContent = 'вң•';
    resetBtn.title = 'мғүмғҒ м ңкұ°';
    resetBtn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      applyHighlight(chIdx, lineIdx, el, null);
      closePopup();
    });
    colorPopup.appendChild(resetBtn);

    // мң„м№ҳ кі„мӮ°
    const rect = el.getBoundingClientRect();
    let left = e.clientX;
    let top = rect.bottom + 6;

    // нҷ”л©ҙ л°– л°©м§Җ
    if (left + 220 > window.innerWidth) left = window.innerWidth - 230;
    if (top + 50 > window.innerHeight) top = rect.top - 50;

    colorPopup.style.left = left + 'px';
    colorPopup.style.top = top + 'px';
    colorPopup.classList.add('show');
  }

  function applyHighlight(chIdx, lineIdx, el, color) {
    chapters[chIdx].lineData[lineIdx].highlightColor = color;
    if (color) {
      el.style.background = color + '33';
      el.style.borderLeftColor = color;
    } else {
      el.style.background = '';
      el.style.borderLeftColor = 'transparent';
    }
  }

  function closePopup() {
    colorPopup.classList.remove('show');
  }

  document.addEventListener('click', closePopup);

  // === HTML ліҖнҷҳ ===
  convertBtn.addEventListener('click', () => {
    if (chapters.length === 0) return;
    const html = generateHtml();
    copyToClipboard(html);
    showToast('HTML мҪ”л“ңк°Җ нҒҙлҰҪліҙл“ңм—җ ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ!');
  });

  function generateHtml() {
    let parts = [];

    const containerStart = `<div style="max-width:720px!important;margin:0 auto!important;padding:1.5rem!important;font-family:'Noto Sans KR',sans-serif!important;line-height:1.9!important;color:#3a3a3a!important;font-size:1rem!important;word-break:keep-all!important;overflow-wrap:break-word!important;box-sizing:border-box!important;">`;
    const containerEnd = `</div>`;

    parts.push(containerStart);

    chapters.forEach((ch, chIdx) => {
      const isMultiChapter = chapters.length > 1;

      if (isMultiChapter) {
        parts.push(`<details${chIdx === 0 ? ' open' : ''}>`);
        parts.push(`<summary style="font-size:1.05rem!important;font-weight:700!important;color:#b07cc8!important;cursor:pointer!important;padding:0.6rem 0!important;border-bottom:2px solid #e4ddd4!important;margin-bottom:0.5rem!important;list-style:none!important;">${escapeHtml(ch.name)}</summary>`);
      }

      ch.lineData.forEach(item => {
        if (item.type === 'empty') {
          parts.push('<br>');
          return;
        }

        const text = escapeHtml(item.original.trim());

        if (item.type === 'narration') {
          parts.push(`<p style="color:#3a3a3a!important;margin:0.4em 0!important;line-height:1.9!important;">${text}</p>`);
        } else if (item.type === 'dialogue') {
          if (item.highlightColor) {
            parts.push(`<p style="background:${item.highlightColor}33!important;border-left:3px solid ${item.highlightColor}!important;padding-left:0.6em!important;margin:0.4em 0!important;line-height:1.9!important;">${text}</p>`);
          } else {
            parts.push(`<p style="color:#3a3a3a!important;margin:0.4em 0!important;line-height:1.9!important;">${text}</p>`);
          }
        } else if (item.type === 'monologue') {
          parts.push(`<p style="color:#aaa!important;font-style:italic!important;margin:0.4em 0!important;line-height:1.9!important;">${text}</p>`);
        }
      });

      if (isMultiChapter) {
        parts.push(`</details>`);
      }
    });

    parts.push(containerEnd);
    return parts.join('\n');
  }

  // === мң нӢё ===
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

})();
</script>
